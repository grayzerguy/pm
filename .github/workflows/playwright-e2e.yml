name: Playwright E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install backend requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Install frontend deps and Playwright browsers
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps chromium

      - name: Start backend
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 --app-dir backend > backend.log 2>&1 &

      - name: Start frontend (Next dev)
        run: |
          cd frontend
          nohup npm run dev > ../frontend.log 2>&1 &

      - name: Wait for services
        run: |
          n=0
          until curl -sSf http://127.0.0.1:8000/api/health || [ $n -ge 60 ]; do n=$((n+1)); sleep 1; done
          echo "services ready"

      - name: Run Playwright tests
        run: |
          npx playwright test --config=playwright.config.ts --reporter=list

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: test-results/**
